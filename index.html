<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0b" />
    <title>LED Cube Sim</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0a0a0b;
        --panel: rgba(18, 18, 22, 0.92);
        --border: #2a2a31;
        --text: #e6e6ea;
        --muted: #8a8a94;
        --accent: #7cf;
        --safe-t: env(safe-area-inset-top, 0px);
        --safe-b: env(safe-area-inset-bottom, 0px);
        --safe-l: env(safe-area-inset-left, 0px);
        --safe-r: env(safe-area-inset-right, 0px);
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font: 13px/1.4 ui-monospace, Menlo, Consolas, monospace; -webkit-text-size-adjust: 100%; }
      body { touch-action: none; overscroll-behavior: none; }
      #canvas { position: fixed; inset: 0; display: block; width: 100vw; height: 100dvh; touch-action: none; }

      #ui-toggle {
        position: fixed;
        top: calc(12px + var(--safe-t));
        left: calc(12px + var(--safe-l));
        z-index: 30;
        width: 40px; height: 40px;
        display: none;
        align-items: center; justify-content: center;
        background: var(--panel); color: var(--text);
        border: 1px solid var(--border); border-radius: 10px;
        font-size: 20px; line-height: 1; cursor: pointer;
        backdrop-filter: blur(8px);
      }

      #ui {
        position: fixed;
        top: calc(12px + var(--safe-t));
        left: calc(12px + var(--safe-l));
        width: 340px;
        max-height: calc(100dvh - 24px - var(--safe-t) - var(--safe-b));
        overflow-y: auto;
        padding: 14px;
        background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
        backdrop-filter: blur(8px);
        z-index: 20;
        -webkit-overflow-scrolling: touch;
      }

      #stats {
        position: fixed;
        top: calc(12px + var(--safe-t));
        right: calc(12px + var(--safe-r));
        padding: 10px 14px;
        background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
        font-size: 12px; min-width: 220px;
        z-index: 20;
      }

      #scope {
        position: fixed;
        top: calc(160px + var(--safe-t));
        right: calc(12px + var(--safe-r));
        padding: 8px;
        background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
        width: 280px; display: none;
        max-height: calc(100dvh - 200px - var(--safe-t) - var(--safe-b));
        overflow-y: auto;
        z-index: 20;
      }
      #scope.on { display: block; }
      #scope canvas { display: block; width: 100%; height: 56px; background: #07070a; border-radius: 4px; }
      #scope canvas#scope-spec { height: 96px; }
      #scope .lbl { font-size: 10px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin: 4px 2px 2px; }

      #editor {
        position: fixed;
        bottom: calc(12px + var(--safe-b));
        left: calc(12px + var(--safe-l));
        right: calc(12px + var(--safe-r));
        max-width: 720px;
        margin: 0 auto;
        padding: 10px;
        background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
        display: none;
        z-index: 25;
      }
      #editor.open { display: block; }
      #editor textarea { width: 100%; height: 160px; background: #0e0e12; color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 8px; font: 12px/1.4 ui-monospace, Menlo, Consolas, monospace; resize: vertical; }

      h2 { margin: 0 0 10px; font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); font-weight: 600; }
      hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
      details.section { border-top: 1px solid var(--border); margin: 0; }
      details.section:first-of-type { border-top: none; }
      details.section > summary { cursor: pointer; list-style: none; padding: 10px 2px; font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); font-weight: 600; user-select: none; display: flex; align-items: center; gap: 6px; }
      details.section > summary::-webkit-details-marker { display: none; }
      details.section > summary::before { content: '▸'; display: inline-block; width: 10px; color: var(--accent); transition: transform 0.15s; }
      details.section[open] > summary::before { transform: rotate(90deg); }
      details.section > summary:hover { color: var(--accent); }
      details.section > .section-body { padding: 0 0 12px; }

      .pattern-list { max-height: 260px; overflow-y: auto; margin-bottom: 6px; display: flex; flex-direction: column; gap: 2px; }
      .pattern-cat { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); padding: 6px 2px 2px; font-weight: 600; }
      .pattern-btn { display: block; width: 100%; text-align: left; padding: 6px 8px; background: #0e0e12; border: 1px solid var(--border); border-radius: 6px; cursor: pointer; color: var(--text); transition: border-color 0.1s, background 0.1s; }
      .pattern-btn:hover { border-color: var(--accent); }
      .pattern-btn.active { border-color: var(--accent); background: rgba(124, 224, 255, 0.12); }
      .pattern-btn .pname { font-size: 12px; font-weight: 600; color: var(--text); line-height: 1.2; }
      .pattern-btn.active .pname { color: var(--accent); }
      .pattern-btn .pdesc { font-size: 10px; color: var(--muted); line-height: 1.3; margin-top: 2px; }

      .audio-status { display: flex; align-items: center; gap: 6px; padding: 6px 8px; margin-bottom: 6px; background: #0e0e12; border: 1px solid var(--border); border-radius: 6px; font-size: 11px; }
      .audio-status .dot { font-size: 14px; }
      .audio-status .dot.off { color: var(--muted); }
      .audio-status .dot.on { color: var(--accent); }
      .audio-status .label { color: var(--text); font-weight: 500; }
      .timeline-wrap { margin-bottom: 8px; }
      label { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin: 6px 0; font-size: 12px; color: var(--muted); }
      label > span:last-child { color: var(--text); }
      input[type="range"] { flex: 1; min-width: 0; }
      input[type="number"], select, button, textarea { background: #0e0e12; color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 4px 6px; font: inherit; }
      button { cursor: pointer; padding: 6px 10px; }
      button:hover { border-color: var(--accent); color: var(--accent); }
      button.primary { background: var(--accent); color: #081418; border-color: var(--accent); font-weight: 600; }
      .row { display: flex; gap: 6px; flex-wrap: wrap; }
      .row > * { flex: 1; min-width: 0; }
      .err { color: #f66; font-size: 11px; white-space: pre-wrap; margin-top: 6px; }
      .kv { display: grid; grid-template-columns: 1fr auto; gap: 4px 10px; font-size: 11px; }
      .kv .k { color: var(--muted); }
      .warn { color: #fc6; }
      .bad { color: #f66; }

      /* ─── Mobile / narrow viewports ─── */
      @media (max-width: 720px) {
        #ui-toggle { display: flex; }

        body:not(.ui-open) #ui { display: none; }
        #ui {
          top: calc(60px + var(--safe-t));
          left: calc(8px + var(--safe-l));
          right: calc(8px + var(--safe-r));
          width: auto;
          max-height: calc(100dvh - 72px - var(--safe-t) - var(--safe-b));
          padding: 12px;
          z-index: 25;
        }

        #stats {
          top: calc(12px + var(--safe-t));
          right: calc(12px + var(--safe-r));
          padding: 6px 10px;
          font-size: 11px;
          min-width: 0;
        }
        /* Hide pixel/strip lines on mobile to keep it small; FPS/draw still visible */
        #stats .kv { grid-template-columns: auto auto; gap: 2px 8px; }

        #scope {
          top: auto;
          bottom: calc(12px + var(--safe-b));
          left: calc(8px + var(--safe-l));
          right: calc(8px + var(--safe-r));
          width: auto;
          padding: 6px;
        }
        #scope canvas { height: 48px; }

        #editor {
          left: calc(8px + var(--safe-l));
          right: calc(8px + var(--safe-r));
          padding: 8px;
        }
        #editor textarea { height: 120px; font-size: 13px; }

        /* Bigger touch targets */
        button, select, input[type="number"], input[type="text"] { min-height: 36px; padding: 6px 10px; font-size: 14px; }
        input[type="range"] { height: 36px; }
        input[type="color"] { width: 44px !important; height: 28px !important; }
        label { margin: 8px 0; font-size: 13px; }
      }

      /* Very narrow: stack stats below toggle */
      @media (max-width: 380px) {
        #stats { font-size: 10px; padding: 4px 8px; }
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <button id="ui-toggle" aria-label="Toggle controls" type="button">&#9776;</button>
    <aside id="ui"></aside>
    <aside id="stats"></aside>
    <aside id="scope">
      <div class="lbl">Waveform</div>
      <canvas id="scope-wave" width="480" height="128"></canvas>
      <div class="lbl">FFT bands</div>
      <canvas id="scope-fft" width="480" height="128"></canvas>
      <div class="lbl">Spectrogram (scrolling)</div>
      <canvas id="scope-spec" width="480" height="128"></canvas>
    </aside>
    <section id="editor">
      <textarea id="editor-text" spellcheck="false"></textarea>
      <div class="row" style="margin-top: 6px;">
        <button id="editor-apply" class="primary">Apply (Ctrl+Enter)</button>
        <button id="editor-close">Close</button>
      </div>
      <div class="err" id="editor-err"></div>
    </section>
    <script>
      // UI drawer toggle (mobile)
      (function () {
        const btn = document.getElementById('ui-toggle');
        const body = document.body;
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          body.classList.toggle('ui-open');
        });
        // Tap outside the UI panel on mobile to close it
        document.addEventListener('pointerdown', (e) => {
          if (!body.classList.contains('ui-open')) return;
          const ui = document.getElementById('ui');
          const target = e.target;
          if (ui && target instanceof Node && !ui.contains(target) && target !== btn) {
            body.classList.remove('ui-open');
          }
        });
      })();
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
